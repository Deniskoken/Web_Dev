<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Spin-off of "Project: Event invite"</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: rgb(240, 240, 240);
            }

            .invite {
                background-color: white;
                width: 300px;
                padding: 15px;
                margin: 40px auto;
                border: 2px solid black;
                text-align: center;
            }

            .go {
                background-color: green;
                border: 1px  black;
                padding: 8px;
                margin-top: 10px;
            }
        </style>
    </head>
    <body>
        
        <div class="invite">
            <h1>You're invited!</h1>
            <h2>Birthday Party</h2>
            
            <p><strong>The details:</strong></p>
            <ul>
                <li>Date: March 15</li>
                <li>Time: 6:00 PM</li>
                <li>Place: My house</li>
            </ul>
            
            <p>Friends and family are welcome!</p>
            
            <button class="go">GO!</button>
        </div>
        
    </body>
</html>
